title: Relatório IMECC
author: IMECC - Unicamp
version: 0.1.0
quarto-required: ">=1.3.0"
contributes:
  formats:
    pdf:
      template: template.tex
      top-level-division: chapter
      colorlinks: false
      keep-tex: true
      echo: false
      fig-width: 6
      fig-height: 3
      cite-method: natbib
      biblio-config: false
      filters:
        - latex-environment
      environments:
        - resumo-pt
        - resumo-en
        - citacao
